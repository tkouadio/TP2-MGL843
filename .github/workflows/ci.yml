name: CI Analysis & Tests

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, master, dev]

jobs:
  analysis:
    runs-on: ubuntu-latest
    # On utilise l'image Moose officielle : tout est déjà installé dedans !
    container:
      image: moosetechnology/moose:v11

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install ts2famix
        run: |
          npm ci
          npm install -g ts2famix

      - name: Run tests
        run: npm test

      - name: Generate FAMIX model
        run: ts2famix -i tsconfig.json -o TP2-mgl843-model.json

      - name: Install NeoCSV and Run Metrics
        run: |
          # Dans ce conteneur, l'exécutable s'appelle 'pharo' et l'image 'Moose.image'
          ./pharo Moose.image eval --save "Metacello new baseline: 'NeoCSV'; repository: 'github://svenvc/NeoCSV'; load."

          # On lance ton script d'export
          ./pharo --headless Moose.image st scripts/export_metrics_csv.st --quit

      - name: Upload CSV metrics
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-csv
          path: metrics_tp2.csv

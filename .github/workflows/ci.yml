name: CI Analysis & Tests

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, master, dev]

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install JS dependencies
        run: |
          npm ci
          npm install -g ts2famix

      - name: Generate FAMIX model
        run: ts2famix -i tsconfig.json -o TP2-mgl843-model.json

      - name: Install Moose 11 & NeoCSV
        run: |
          # 1. Télécharger le lanceur Pharo
          curl -L https://get.pharo.org/64/110+vm | bash

          # 2. Télécharger l'image Moose 11 pré-construite (Lien direct officiel)
          curl -L https://get.pharo.org/64/moose11 | bash

          # 3. Installer NeoCSV sur Moose11.image
          ./pharo Moose11.image eval --save "
            Metacello new
              baseline: 'NeoCSV';
              repository: 'github://svenvc/NeoCSV';
              load.
          "

      - name: Run Moose metrics
        # On utilise Moose11.image qui contient déjà Moose et Famix
        run: ./pharo --headless Moose11.image st scripts/export_metrics_csv.st --quit

      - name: Upload CSV metrics
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-csv
          path: metrics_tp2.csv

name: CI Analysis & Tests

on:
  pull_request:
    branches: ["**"]

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      # --- CHECKOUT ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- NODE / TESTS ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install -g ts2famix

      - name: Run tests
        run: npm test

      # --- MODEL GENERATION ---
      - name: Generate FAMIX model
        run: ts2famix -i tsconfig.json -o TP2-mgl843-model.json

      # --- PHARO + MOOSE ---
      - name: Install Pharo 11 + Famix only (FAST CI)
        env:
          METACELLO_DISABLE_ICEBERG: "true"
        run: |
          curl -L https://get.pharo.org/64/110+vm | bash

          ./pharo Pharo.image eval --save "
            Metacello new
              baseline: 'Famix';
              repository: 'github://moosetechnology/Famix/src';
              load.
          "

          wget -nc https://files.pharo.org/sources/PharoV110.sources

      # --- EXPORT METRICS ---
      - name: Run Moose metrics
        run: ./pharo --headless Pharo.image st export_metrics.st

      # --- ARCHIVE ---
      - name: Upload CSV metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics-csv
          path: metrics_tp2.csv

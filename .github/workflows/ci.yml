name: CI Analysis & Tests

on:
  pull_request:
    branches: ["**"]

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      # --- CHECKOUT ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- NODE / TESTS ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install -g ts2famix

      - name: Run tests
        run: npm test

      # --- MODEL GENERATION ---
      - name: Generate FAMIX model
        run: ts2famix -i tsconfig.json -o TP2-mgl843-model.json

      # --- PHARO + MOOSE + NEOCSV ---
      - name: Install Pharo, Moose & NeoCSV
        run: |
          curl -L https://get.pharo.org/64/110+vm | bash
          ./pharo Pharo.image eval --save "
            [ 
              Metacello new
                baseline: 'Moose';
                repository: 'github://moosetechnology/Moose/src';
                load. \"Chargement par défaut (plus robuste)\"
                
              Metacello new
                baseline: 'NeoCSV';
                repository: 'github://svenvc/NeoCSV';
                load.
            ] on: Error do: [ :ex | 
                Stdio stdout nextPutAll: 'LOG: ' , ex description; lf. 
                ex resume ].
          "
          wget -nc https://files.pharo.org/sources/PharoV110.sources

      # --- EXPORT METRICS ---
      - name: Run Moose metrics
        run: ./pharo --headless Pharo.image st scripts/export_metrics_csv.st --quit

      # --- ARCHIVE ---
      - name: Upload CSV metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics-csv
          path: metrics_tp2.csv

name: CI Analysis & Tests

on:
  pull_request:
    branches: ["**"]

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      # --- CHECKOUT ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- NODE / TESTS ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install -g ts2famix

      - name: Run tests
        run: npm test

      # --- MODEL GENERATION ---
      - name: Generate FAMIX model
        run: ts2famix -i tsconfig.json -o TP2-mgl843-model.json

      # --- PHARO + MOOSE + NEOCSV ---
      - name: Install Moose 11 Image
        run: |
          # Télécharger l'image Moose 11 directement
          curl -L https://get.pharo.org/64/moose11 | bash

          # Installer NeoCSV sur cette image
          ./pharo Moose11.image eval --save "
            [ 
              Metacello new
                baseline: 'NeoCSV';
                repository: 'github://svenvc/NeoCSV';
                load.
            ] on: Error do: [ :ex | ex resume ].
          "
          # S'assurer d'avoir les sources
          wget -nc https://files.pharo.org/sources/PharoV110.sources

      # --- EXPORT METRICS ---
      - name: Run Moose metrics
        run: |
          # Notez qu'on utilise Moose11.image ici
          ./pharo --headless Moose11.image st scripts/export_metrics_csv.st --quit

      # --- ARCHIVE ---
      - name: Upload CSV metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics-csv
          path: metrics_tp2.csv
